# Two services:
#   atlas-db  → Postgres for Atlas-owned state (users, sessions, audit, pincode_directory).
#               Data persisted in a named docker volume so restarts don't wipe it.
#               Init scripts in sql/init/ run ONCE on first boot.
#   atlas-web → Next.js app. Reads operational data from the external LabStack DB
#               (SOURCE_DATABASE_URL), reads/writes Atlas state from atlas-db
#               (APP_DATABASE_URL).
#
# Quick start (on the VM):
#   cp .env.production.example .env.production   # fill in SOURCE_DATABASE_URL etc.
#   docker compose up -d --build
#   docker compose logs -f atlas-db              # watch for "atlas.pincode_directory ready"
#
# Seed the first admin from the VM host:
#   APP_DATABASE_URL=postgres://atlas:${ATLAS_DB_PASSWORD}@localhost:15432/atlas \
#     npm run user:create -- admin@labstack.in <pw> "Admin" admin
#
# Health checks:
#   curl http://localhost:8001/api/health   →  {"status":"ok","db":"up"}

services:
  atlas-db:
    image: postgres:16-alpine
    container_name: atlas-db
    restart: unless-stopped
    env_file:
      # Provides SOURCE_DATABASE_URL to the container at runtime. 03_fdw.sh
      # reads it to configure the postgres_fdw foreign server.
      - .env.production
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${ATLAS_DB_PASSWORD:-atlas}
      POSTGRES_DB: atlas
    volumes:
      - atlas-data:/var/lib/postgresql/data
      # Init scripts run lexically on first boot:
      #   01_schema.sql              — atlas.* tables
      #   02_pincode_directory.sql   — load India Post CSV
      #   03_fdw.sh                  — postgres_fdw + src.* foreign tables
      #   04_analytics_views.sh      — build analytics.mv_* by reading from /atlas-sql
      - ./sql/init:/docker-entrypoint-initdb.d:ro
      # The MV definitions live in the parent sql/ directory; 04_analytics_views.sh
      # reads them from here. Mounted read-only — the container can't modify them.
      - ./sql:/atlas-sql:ro
    ports:
      # Expose to the host for direct CLI access (npm run user:create, psql).
      # 15432 picked to avoid clashes with host Postgres (5432) and any other
      # Docker port leases that often sit on 5433-5434.
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  atlas-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-web
    restart: unless-stopped
    depends_on:
      atlas-db:
        condition: service_healthy
    ports:
      # Host 8001 → container's internal 3010. The reverse proxy on the VM
      # (Caddy/nginx terminating https://atlas.labstack.in) forwards to :8001.
      # The Next.js process itself still listens on 3010 inside the container.
      - "8001:3010"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3010"
      HOSTNAME: "0.0.0.0"
      # Default: atlas-web reaches atlas-db via the compose network's DNS name.
      # The .env.production file can override APP_DATABASE_URL if you point
      # atlas-web at an externally-managed Postgres instead.
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgres://atlas:${ATLAS_DB_PASSWORD:-atlas}@atlas-db:5432/atlas}
    # host.docker.internal: lets atlas-web reach a Postgres running on the
    # VM's host network (the operational LabStack DB) on Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  atlas-data:
    name: atlas-data
